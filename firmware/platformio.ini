; E46 Race Dash firmware
; Target: Waveshare ESP32-S3-Touch-LCD-7 (ESP32-S3, 16MB flash, 8MB octal PSRAM)

[env:dash]
platform = espressif32
board = esp32-s3-devkitc-1
framework = arduino
board_build.flash_size = 16MB
board_build.memory_type = qio_opsram
board_upload.flash_size = 16MB
build_flags =
    -DBOARD_HAS_PSRAM
    -DSIM_MODE=1          ; 1 = bench sim (no car), 0 = live CAN
monitor_speed = 115200

; Native environment for running decode/gear/fault unit tests on a PC.
; Requires a local gcc/clang (not needed for the ESP32 build).
[env:native]
platform = native
test_framework = unity
build_flags = -std=c++17
build_src_filter = +<vehicle_state.h> +<can_ms43.*> +<gear_calc.*> +<faults.*>
